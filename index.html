<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>国家安全作业</title>
  <style>
    body {
      margin: 0;
      padding: 0;
    }
    #subPageContainer {
      width: 100%;
      min-height: 100vh;
    }
  </style>
  <script>
    function loadSubPage() {
      // 使用 iframe 方式加载子页面，避免 CORS 问题
      var iframe = document.createElement('iframe');
      iframe.src = 'resources/百度文库_files/saved_resource.html';
      iframe.style.width = '100%';
      iframe.style.height = '100vh';
      iframe.style.border = 'none';
      // iframe.onload = function() {
      //   console.log('子页面加载成功');
      // };
      // iframe.onerror = function() {
      //   console.error('子页面加载失败');
      // };
      document.getElementById('subPageContainer').appendChild(iframe);
    }
  </script>
</head>
<body onload="loadSubPage()">
  <div id="subPageContainer">
    <!-- <p style="text-align:center;padding:50px;">正在加载页面...</p> -->
  </div>
</body>
</html>
